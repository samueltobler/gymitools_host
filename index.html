<!doctype html>
<html lang="de-CH">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gymi-Tools</title>
  <meta name="description" content="Sammlung moderner Unterrichtstools." />

  <!-- Font Awesome für Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />

  <style>
    :root{
      --bg1:#f6f8ff;
      --bg2:#ffffff;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#475569;
      --border: rgba(15,23,42,.10);
      --shadow: 0 18px 55px rgba(2,6,23,.10);
      --shadow2: 0 10px 30px rgba(2,6,23,.08);
      --radius: 22px;
      --focus: rgba(59,130,246,.35);
      --chip: rgba(2,6,23,.04);
      --tabbg: rgba(255,255,255,.70);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color: var(--text);

      background:
        radial-gradient(900px 520px at 18% 10%, rgba(59,130,246,.18), transparent 60%),
        radial-gradient(900px 520px at 80% 15%, rgba(16,185,129,.14), transparent 60%),
        radial-gradient(900px 520px at 55% 95%, rgba(168,85,247,.12), transparent 55%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 55%, var(--bg1) 100%);

      background-repeat: no-repeat;
      background-attachment: fixed;
      background-size: cover;

      line-height:1.45;
    }

    a{ color:inherit; text-decoration:none; }

    .wrap{
      max-width: 1120px;
      margin: 0 auto;
      padding: 34px 18px 56px;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap: 16px;
      flex-wrap:wrap;
      padding: 10px 0 18px;
    }

    .brand{ min-width: 260px; }
    .title{
      margin:0;
      font-size: clamp(30px, 3.2vw, 46px);
      letter-spacing:-0.02em;
    }

    .subtitle{
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }
    .subtitle a{
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(15,23,42,.18);
    }
    .subtitle a:hover{
      border-bottom-color: rgba(15,23,42,.35);
    }

    .intro{
      margin: 10px 0 0;
      color: var(--muted);
      max-width: 62ch;
      font-size: 14px;
    }

    .topbar{
      display:flex;
      align-items:flex-end;
      gap: 10px;
      min-width: 0;
      flex: 1;
      justify-content:flex-end;
      flex-wrap: wrap;
      max-width: 760px;
    }

    /* Tabs */
    .tabs{
      display:flex;
      gap: 8px;
      align-items:center;
      max-width: 100%;
      overflow-x: auto;
      padding: 6px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--tabbg);
      box-shadow: var(--shadow2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar{
      display:none;
    }

    .tab{
      border: 1px solid transparent;
      background: transparent;
      color: rgba(15,23,42,.82);
      padding: 9px 12px;
      border-radius: 999px;
      font: inherit;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      transition: 140ms ease;
      white-space: nowrap;
    }

    .tab:hover{
      background: rgba(2,6,23,.04);
      border-color: rgba(15,23,42,.08);
    }

    .tab[aria-selected="true"]{
      background: rgba(59,130,246,.12);
      border-color: rgba(59,130,246,.25);
      color: rgba(15,23,42,.95);
    }

    .tab:focus{
      outline:none;
      box-shadow: 0 0 0 4px var(--focus);
    }

    .controlrow{
      display:flex;
      align-items:center;
      gap: 10px;
      flex: 0 1 auto;
      min-width: 0;
      max-width: 100%;
      white-space: nowrap;
    }

    .viewcontrols{
      display:flex;
      align-items:center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .viewtoggle{
      flex: 0 0 48px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width: 48px;
      height: 48px;
      padding: 0;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.75);
      color: var(--text);
      box-shadow: var(--shadow2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      cursor:pointer;
      font: inherit;
      font-size: 14px;
      white-space:nowrap;
    }

    .viewtoggle i{
      width: 16px;
      text-align:center;
      font-size: 15px;
    }

    .viewtoggle:hover{
      border-color: rgba(15,23,42,.22);
    }

    .viewtoggle:focus{
      outline:none;
      border-color: rgba(59,130,246,.35);
      box-shadow: 0 0 0 4px var(--focus), var(--shadow2);
    }

    .search{
      position:relative;
      width: min(240px, 100%);
      flex: 0 1 240px;
      min-width: 120px;
    }

    .search input{
      width:100%;
      padding: 12px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.75);
      color: var(--text);
      outline:none;
      box-shadow: var(--shadow2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .search input::placeholder{ color: rgba(71,85,105,.85); }

    .search .icon{
      position:absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      opacity: .65;
      pointer-events:none;
      color: #0f172a;
    }

    .search input:focus{
      border-color: rgba(59,130,246,.35);
      box-shadow: 0 0 0 4px var(--focus), var(--shadow2);
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
      margin-top: 14px;
      padding-bottom: 100px;
    }

    .card{
      grid-column: span 4;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow:hidden;
      box-shadow: var(--shadow);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      position:relative;
      cursor: pointer;
    }

    .grid.list-view .card{
      grid-column: 1 / -1;
      display:flex;
      align-items:stretch;
      min-height: 118px;
    }

    .grid.list-view .thumbwrap{
      width: 150px;
      min-width: 150px;
      aspect-ratio: auto;
    }

    .grid.list-view .thumbimg{
      width: 82%;
      height: 82%;
    }

    .grid.list-view .content{
      flex: 1;
      justify-content:center;
    }

    .grid.list-view .ctitle{
      font-size: 15px;
    }

    .grid.list-view .desc{
      max-width: 80ch;
    }

    .card:focus-within{
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    .thumbwrap{
      aspect-ratio: 16/9;
      width: 100%;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background-size: cover;
      background-position: center;
    }

    .thumbimg{
      width: 92%;
      height: 92%;
      object-fit: contain;
      display:block;
      filter: drop-shadow(0 14px 30px rgba(2,6,23,.18));
    }

    .content{
      padding: 14px 14px 16px;
      display:flex;
      flex-direction:column;
      gap: 8px;
    }

    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
    }

    .ctitle{
      margin:0;
      font-size: 16px;
      letter-spacing:-0.01em;
    }

    .chip{
      font-size: 12px;
      color: rgba(15,23,42,.70);
      background: var(--chip);
      border: 1px solid rgba(15,23,42,.08);
      padding: 6px 10px;
      border-radius: 999px;
      white-space:nowrap;
    }

    .desc{
      margin:0;
      color: var(--muted);
      font-size: 13px;
    }

    /* klar klickbar */
    .card{ cursor: pointer; }

    @media (hover: hover) and (pointer: fine){
      .card:hover{
        transform: translateY(-4px);
        border-color: rgba(15,23,42,.22);
        box-shadow: 0 22px 70px rgba(2,6,23,.12);
      }

      .card:hover .ctitle{
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .card:hover .chip{
        border-color: rgba(15,23,42,.18);
      }

      .card::after{
        content: "↗";
        position:absolute;
        top: 10px;
        right: 12px;
        width: 30px;
        height: 30px;
        display:flex;
        align-items:center;
        justify-content:center;
        border-radius: 999px;
        background: rgba(255,255,255,.75);
        border: 1px solid rgba(15,23,42,.10);
        box-shadow: 0 10px 30px rgba(2,6,23,.08);
        color: rgba(15,23,42,.70);
        opacity: 0;
        transform: translateY(-3px);
        transition: 160ms ease;
        pointer-events:none;
        z-index: 6;
      }

      .card:hover::after{ opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 980px){
      .card{ grid-column: span 6; }

      .brand{
        flex: 0 0 100%;
      }

      .topbar{
        flex: 0 0 100%;
        width: 100%;
        max-width: 100%;
        justify-content:flex-start;
        align-items:center;
        margin-top: 4px;
      }

      .tabs{
        max-width: 100%;
      }
    }

    @media (max-width: 620px){
      .wrap{ padding-bottom: 44px; }
      .topbar{ align-items:stretch; }
      .card{ grid-column: span 12; }
      .tabs{ width: 100%; border-radius: 18px; justify-content:flex-start; }
      .tab{ padding: 9px 10px; }
      .controlrow{ width: 100%; flex: 1 1 100%; }
      .search{ width: auto; flex: 1 1 auto; min-width: 0; }
      .viewcontrols{ width: auto; justify-content:flex-end; }
      .grid.list-view .card{ min-height: 96px; }
      .grid.list-view .thumbwrap{ width: 104px; min-width: 104px; }
      .grid.list-view .row{ align-items:flex-start; }
      .grid.list-view .chip{ display:none; }
    }

    @media (prefers-reduced-motion: reduce){
      .card{ transition:none; }
      .card::after{ transition:none; }
      .tab{ transition:none; }
    }

    a.card,
    a.card *{
      cursor: pointer !important;
    }

    .pagination{
      display:flex;
      align-items:center;
      justify-content:center;
      gap: 10px;
      margin-top: -72px;
      padding-bottom: 72px;
    }

    .pagebtn{
      width: 42px;
      height: 42px;
      padding: 0;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.75);
      color: var(--text);
      box-shadow: var(--shadow2);
      cursor:pointer;
      font: inherit;
      font-size: 13px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .pagebtn:hover{
      border-color: rgba(15,23,42,.22);
    }

    .pagebtn[aria-current="page"]{
      background: rgba(59,130,246,.12);
      border-color: rgba(59,130,246,.25);
      cursor: default;
    }

    .pagebtn:disabled{
      cursor:not-allowed;
      opacity:.45;
    }
    .footer{
      margin-top:20px;
      margin-bottom:20px;
      text-align:center;
      font-size:11px;
      color:rgba(0,0,0,0.5);
    }

    .footer a{
      color:rgba(0,0,0,0.5);
      text-decoration:none;
    }

    .footer a:hover{
      text-decoration:underline;
    }

  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <h1 class="title">Gymi-Tools</h1>
        <p class="subtitle">von
          <a href="https://samueltobler.github.io" target="_blank" rel="noopener noreferrer">Samuel Tobler</a>
        </p>
        <p class="intro">
          Unterrichtstools fürs Gymi: Prüfungsuhren, Gruppengeneratoren, oder Rechner für Prüfungsstatistiken, Apps für den Biologieunterricht sowie Biologie-inspirierte Spiele wie Montagsmaler oder Imposter.
        </p>
      </div>

      <div class="topbar">
        <div class="tabs" role="tablist" aria-label="Kategorie auswählen">
  <button class="tab" type="button" role="tab" aria-selected="true"  data-kat="__all">Alle</button>
  <button class="tab" type="button" role="tab" aria-selected="false" data-kat="__tools">Tools</button>
  <button class="tab" type="button" role="tab" aria-selected="false" data-kat="biologie">Biologie</button>
  <button class="tab" type="button" role="tab" aria-selected="false" data-kat="artikel">Artikel</button>
  <button class="tab" type="button" role="tab" aria-selected="false" data-kat="spiel">Spiele</button>
</div>

        <div class="controlrow" aria-label="Suche, Ansicht und Reihenfolge">
          <div class="search" aria-label="Tools durchsuchen">
             <input id="q" type="search" placeholder="Suchen..." autocomplete="off" />
          </div>

          <div class="viewcontrols" aria-label="Ansicht und Reihenfolge">
            <button class="viewtoggle" id="viewToggle" type="button" aria-pressed="false" aria-label="Zur Listenansicht wechseln" title="Listenansicht">
              <i class="fas fa-list" aria-hidden="true"></i>
              <span></span>
            </button>

            <button class="viewtoggle" id="sortToggle" type="button" aria-pressed="false" aria-label="Alphabetisch sortieren" title="Alphabetisch sortieren">
              <i class="fas fa-sort-alpha-down" aria-hidden="true"></i>
              <span></span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="grid" id="grid" aria-live="polite"></section>
      <nav class="pagination" id="pagination" aria-label="Seitennavigation"></nav>

      <div class="footer">
        © 2026 <a href="https://samueltobler.github.io" target="_blank" rel="noopener noreferrer">Samuel Tobler</a> |
        <a href="mailto:gymitools@gmail.com" target="_blank">Kontakt</a> | 
        <a href="https://samueltobler.github.io/impressum" target="_blank" rel="noopener noreferrer">Impressum
      </div>

    </main>
  </div>

  <script>
    const q = document.getElementById('q');
    const grid = document.getElementById('grid');
    const pagination = document.getElementById('pagination');
    const tabs = Array.from(document.querySelectorAll('.tab'));
    const viewToggle = document.getElementById('viewToggle');
    const sortToggle = document.getElementById('sortToggle');

    const CSV_URL  = "https://raw.githubusercontent.com/samueltobler/gymitools_host/main/data.csv";
    const IMG_BASE = "https://raw.githubusercontent.com/samueltobler/gymitools_host/main/img/";
    const BG_FILES = ["bg1.png", "bg2.png", "bg3.png", "bg4.png", "bg5.png", "bg6.png", "bg7.png", "bg8.png"];

    const PAGE_SIZE = 10;
    let activeKat = "__all";
    let allRows = [];
    let currentRows = [];
    let currentPage = 1;
let activeSortMode = localStorage.getItem('gymiToolsSortMode') === 'random' ? 'random' : 'alpha';
    const TOOL_KATS = new Set(['tool', 'tools']);
    
    function norm(s){ return (s || '').toLowerCase().trim(); }

    function escapeHtml(s){
      return String(s ?? '')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#039;");
    }

    function parseSemicolonCSV(text){
      const lines = text.replace(/\r/g,'').split('\n').filter(l => l.trim().length);
      if(lines.length < 2) return [];
      const header = lines[0].split(';').map(h => h.trim());

      const idxTitel  = header.indexOf('Titel');
      const idxBeschr = header.indexOf('Beschreibung');
      const idxDatei  = header.indexOf('Datei');
      const idxLink   = header.indexOf('Link');
      const idxKat    = header.indexOf('Kategorie');

      return lines.slice(1).map(line => {
        const cols = line.split(';');
        return {
          titel: (cols[idxTitel] ?? '').trim(),
          beschreibung: (cols[idxBeschr] ?? '').trim(),
          datei: (cols[idxDatei] ?? '').trim(),
          link: (cols[idxLink] ?? '').trim(),
          kategorie: (cols[idxKat] ?? '').trim(),
        };
      }).filter(r => r.titel && r.datei && r.link);
    }

    function shuffleInPlace(arr){
      for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function pickRandomBgUrl(){
      const bg = BG_FILES[Math.floor(Math.random() * BG_FILES.length)];
      return IMG_BASE + bg;
    }

    function makeCard({ titel, beschreibung, datei, link, kategorie }){
      const img = IMG_BASE + datei;
      const tag = kategorie || 'Tool';
      const bgUrl = pickRandomBgUrl();

      const a = document.createElement('a');
      a.className = 'card';
      a.href = link;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.setAttribute('aria-label', `${titel} öffnen`);

      a.dataset.title = titel;
      a.dataset.desc = beschreibung;
      a.dataset.kategorie = tag;

      a.innerHTML = `
        <div class="thumbwrap" style="background-image:url('${escapeHtml(bgUrl)}')">
          <img class="thumbimg" src="${escapeHtml(img)}" alt="${escapeHtml(titel)}" loading="lazy">
        </div>

        <div class="content">
          <div class="row">
            <h2 class="ctitle">${escapeHtml(titel)}</h2>
            <span class="chip">${escapeHtml(tag)}</span>
          </div>
          <p class="desc">${escapeHtml(beschreibung)}</p>
        </div>
      `;
      return a;
    }

    function sortRows(rows, mode){
      const sortedRows = [...rows];

      if(mode === 'alpha'){
        return sortedRows.sort((a, b) =>
          a.titel.localeCompare(b.titel, 'de-CH', { sensitivity: 'base' })
        );
      }

      return shuffleInPlace(sortedRows);
    }

    function renderRows(rows){
      currentRows = [...rows];
      currentPage = 1;
      applyFilter();
    }

    function renderPagination(totalItems, totalPages){
      if(totalItems <= PAGE_SIZE){
        pagination.innerHTML = '';
        return;
      }

      pagination.innerHTML = Array.from({ length: totalPages }, (_, i) => {
        const page = i + 1;
        const current = page === currentPage ? 'aria-current="page"' : '';
        return `<button class="pagebtn" type="button" data-page="${page}" ${current}>${page}</button>`;
      }).join('');
    }

    function setSortMode(mode){
      activeSortMode = mode === 'alpha' ? 'alpha' : 'random';

      sortToggle.innerHTML = activeSortMode === 'alpha'
        ? '<i class="fas fa-random" aria-hidden="true"></i>'
        : '<i class="fas fa-sort-alpha-down" aria-hidden="true"></i>';
      sortToggle.setAttribute('aria-pressed', String(activeSortMode === 'alpha'));
      sortToggle.setAttribute('aria-label', activeSortMode === 'alpha' ? 'Zufällig sortieren' : 'Alphabetisch sortieren');
      sortToggle.setAttribute('title', activeSortMode === 'alpha' ? 'Zufällig sortieren' : 'Alphabetisch sortieren');
      localStorage.setItem('gymiToolsSortMode', activeSortMode);

      if(allRows.length){
        renderRows(sortRows(allRows, activeSortMode));
      }
    }
    

    function setActiveTab(kat){
      activeKat = kat;
      currentPage = 1;
      for(const btn of tabs){
        const isActive = btn.dataset.kat === kat;
        btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
      }
      applyFilter();
    }

    function applyFilter(){
  const term = norm(q.value);

  const filteredRows = currentRows.filter(row => {
    const cardKat = norm(row.kategorie || 'Tool');

    const matchesTab =
      (activeKat === "__all") ||
      (activeKat === "__tools" && TOOL_KATS.has(cardKat)) ||
      (activeKat !== "__tools" && activeKat !== "__all" && cardKat === activeKat);

    const hay = norm(
      row.titel + ' ' +
      row.beschreibung + ' ' +
      (row.kategorie || '')
    );

    const matchesSearch = (!term || hay.includes(term));
    return matchesTab && matchesSearch;
  });

  const totalPages = Math.max(1, Math.ceil(filteredRows.length / PAGE_SIZE));
  if(currentPage > totalPages) currentPage = totalPages;

  const start = (currentPage - 1) * PAGE_SIZE;
  const pageRows = filteredRows.slice(start, start + PAGE_SIZE);

  grid.innerHTML = '';
  for(const row of pageRows){
    grid.appendChild(makeCard(row));
  }

  renderPagination(filteredRows.length, totalPages);
}

    function setViewMode(mode){
      const isList = mode === 'list';
      grid.classList.toggle('list-view', isList);
      viewToggle.innerHTML = isList
        ? '<i class="fas fa-th-large" aria-hidden="true"></i>'
        : '<i class="fas fa-list" aria-hidden="true"></i>';
      viewToggle.setAttribute('aria-pressed', String(isList));
      viewToggle.setAttribute('aria-label', isList ? 'Zur Kartenansicht wechseln' : 'Zur Listenansicht wechseln');
      viewToggle.setAttribute('title', isList ? 'Kartenansicht' : 'Listenansicht');
      localStorage.setItem('gymiToolsViewMode', isList ? 'list' : 'grid');
    }

    async function init(){
      try{
        const res = await fetch(CSV_URL, { cache: 'no-store' });
        if(!res.ok) throw new Error(`data.csv nicht gefunden (${res.status})`);
        const text = await res.text();
        allRows = parseSemicolonCSV(text);
        setSortMode(activeSortMode);
      }catch(err){
        grid.innerHTML = `
          <div style="grid-column:1/-1;padding:16px;border:1px solid rgba(15,23,42,.10);border-radius:18px;background:rgba(255,255,255,.75);box-shadow:0 10px 30px rgba(2,6,23,.08);color:#0f172a">
            <strong>Fehler beim Laden der Tools.</strong><br>
            <span style="color:rgba(71,85,105,.9)">CSV oder Bilder konnten nicht geladen werden.</span>
          </div>
        `;
        console.error(err);
      }
    }

    viewToggle.addEventListener('click', () => {
      setViewMode(grid.classList.contains('list-view') ? 'grid' : 'list');
    });

    sortToggle.addEventListener('click', () => {
      setSortMode(activeSortMode === 'alpha' ? 'random' : 'alpha');
    });

    pagination.addEventListener('click', e => {
      const btn = e.target.closest('button[data-page]');
      if(!btn) return;

      currentPage = Number(btn.dataset.page);
      applyFilter();
      window.scrollTo({ top: grid.offsetTop - 20, behavior: 'smooth' });
    });

    setViewMode(localStorage.getItem('gymiToolsViewMode') === 'grid' ? 'grid' : 'list');
    setSortMode(activeSortMode);

    q.addEventListener('input', () => {
      currentPage = 1;
      applyFilter();
    });

    for(const btn of tabs){
      btn.addEventListener('click', () => setActiveTab(btn.dataset.kat));
    }

    init();
  </script>
</body>
</html>
